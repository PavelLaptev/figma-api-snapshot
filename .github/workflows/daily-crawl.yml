name: Daily Figma API Docs Crawl

on:
  schedule:
    # Runs every day at 03:00 UTC
    - cron: "0 3 * * *"
  workflow_dispatch: # allow manual trigger from the Actions tab

permissions:
  contents: write

jobs:
  crawl:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run crawler
        run: npm run build

      - name: Commit and push updated dataset
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add out/
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            PAGES=$(node -e "const m=require('./out/llm/manifest.json'); console.log(m.pageCount)")
            CHUNKS=$(node -e "const m=require('./out/llm/manifest.json'); console.log(m.chunkCount)")
            git commit -m "chore: refresh dataset — ${PAGES} pages, ${CHUNKS} chunks [$(date -u +%Y-%m-%d)]"
            git push
          fi
